        /* Estilo base de la leyenda */
.legend {
    background: white;
    padding: 10px;
    line-height: 20px;
    border-radius: 8px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    color: #444;
    font-size: 13px;
    /* CRÍTICO: Asegura que esté por encima de todo */
    z-index: 1000 !important; 
}

/* Ajustes específicos para Celulares */
@media (max-width: 600px) {
    .legend {
        font-size: 11px; /* Letra un poco más pequeña */
        padding: 6px;    /* Menos espacio interno */
        line-height: 16px;
        max-width: 120px; /* Evita que ocupe media pantalla */
        margin-bottom: 30px !important; /* La sube un poco para que no tape la atribución */
    }
    
    .legend i {
        width: 10px !important;
        height: 10px !important;
        margin-top: 3px !important;
    }
}

    // 2. CAMBIO A MAPA CLARO (CartoDB Positron)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '© OpenStreetMap, © CartoDB'
    }).addTo(map);

    // 3. FUNCIÓN DE COLOR (Rojo -> Azul)
    function getColor(p) {
        return p > 1.5 ? '#0056b3' : // Azul profundo (Excelente votación)
               p > 1 ? '#3385ff' : // Azul claro
               p > 0.5  ? '#ff9999' : // Rojo pálido
                        '#e60000';   // Rojo intenso (Baja votación)
    }

    // 4. DIBUJAR LOS PUNTOS
    Object.keys(votos).forEach(nombre => {
        if (coords[nombre]) {
            const data = votos[nombre];
            const pos = coords[nombre];

            // Círculos con borde suave para que se vean bien en fondo claro
            const marker = L.circleMarker([pos.lat, pos.lng], {
                //radius: Math.sqrt(data.votos_totales) * 0.1, 
                radius: 10,
                fillColor: getColor(data.porcentaje),
                color: "#666", // Borde gris suave
                weight: 1,
                opacity: 0.8,
                fillOpacity: 0.7
            }).addTo(map);

            marker.bindPopup(`
                <div style="text-align: center" class="custom-popup">
                    <h3 style="margin:0 0 5px 0">${nombre}</h3>
                    <b style="font-size: 1.3em; color: ${getColor(data.porcentaje)}">${data.porcentaje}%</b>
                    <div style="border-top: 1px solid #eee; margin-top: 5px; padding-top: 5px;">
                        <small>Votos Fajardo: ${data.votos_sergio_fajardo}</small>
                    </div>
                </div>
            `);
        }
    });

    // 5. LEYENDA ACTUALIZADA
    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function (map) {
        const div = L.DomUtil.create('div', 'legend');
        const labels = ['<strong>Votación Fajardo</strong>'];
        const ranges = [0, 0.5, 1, 1.5];
        
        for (let i = 0; i < ranges.length; i++) {
            div.innerHTML +=
                '<i style="background:' + getColor(ranges[i] + 1) + '; width:12px; height:12px; float:left; margin-right:8px; margin-top:5px; border-radius: 50%;"></i> ' +
                ranges[i] + (ranges[i + 1] ? '% &ndash; ' + ranges[i + 1] + '%<br>' : '%+');
        }
        return div;
    };
    legend.addTo(map);
