        attribution: '© OpenStreetMap, © CartoDB'
    }).addTo(map);

    function getColor(p) {
        return p > 30 ? '#0056b3' : 
               p > 15 ? '#3385ff' : 
               p > 5  ? '#ff9999' : 
                        '#e60000';
    }

    // --- CARGA DE DATOS EXTERNOS ---
    fetch('votos_fajardo_santander_2018.json')
        .then(response => {
            if (!response.ok) {
                throw new Error("No se pudo cargar el archivo datos.json");
            }
            return response.json();
        })
        .then(votos => {
            // Todo el código que usa "votos" debe ir aquí adentro
            dibujarMapa(votos);
        })
        .catch(error => console.error("Error cargando los datos:", error));

    function dibujarMapa(votos) {
        // 4. DIBUJAR LOS PUNTOS
        Object.keys(votos).forEach(nombre => {
            if (coords[nombre]) {
                const data = votos[nombre];
                const pos = coords[nombre];

                const marker = L.circle([pos.lat, pos.lng], {
                    radius: 5000, // Ahora el radio es en METROS (5km)
                    fillColor: getColor(data.porcentaje),
                    color: "#666",
                    weight: 1,
                    opacity: 0.8,
                    fillOpacity: 0.7
                }).addTo(map);

                marker.bindPopup(`
                    <div style="text-align: center" class="custom-popup">
                        <h3 style="margin:0 0 5px 0">${nombre}</h3>
                        <b style="font-size: 1.3em; color: ${getColor(data.porcentaje)}">${data.porcentaje}%</b>
                        <div style="border-top: 1px solid #eee; margin-top: 5px; padding-top: 5px;">
                            <small>Votos Fajardo: ${data.votos_sergio_fajardo}</small>
                        </div>
                    </div>
                `);
            }
        });

        // 5. LEYENDA
        const legend = L.control({position: 'bottomright'});
        legend.onAdd = function (map) {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = '<strong>Votación Fajardo</strong><br>';
            const ranges = [0, 5, 15, 30];
            
            for (let i = 0; i < ranges.length; i++) {
                div.innerHTML +=
                    '<i style="background:' + getColor(ranges[i] + 0.1) + '; width:12px; height:12px; float:left; margin-right:8px; margin-top:5px; border-radius: 50%;"></i> ' +
                    ranges[i] + (ranges[i + 1] ? '% &ndash; ' + ranges[i + 1] + '%<br>' : '%+');
            }
            return div;
        };
        legend.addTo(map);
    }
